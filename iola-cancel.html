<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>iola fitness — 予約確認・キャンセル</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+JP:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #F8F5F0; --white: #FFFFFF; --black: #1A1410;
  --terra: #8B4A2E; --terra-soft: #C4896A;
  --gray-1: #E8E2DA; --gray-2: #D0C8BC; --gray-3: #A89880;
  --text: #2A2018; --text-sub: #7A6A58;
}
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; font-weight:300; min-height:100vh; }

.header { position:fixed; top:0; left:0; right:0; height:56px; background:var(--white); border-bottom:1px solid var(--gray-1); display:flex; align-items:center; justify-content:center; z-index:100; }
.logo { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:300; letter-spacing:.28em; color:var(--black); }

.page-wrap { padding-top:56px; min-height:100vh; }

/* ── SEARCH SCREEN ── */
.search-wrap { padding:40px 20px; }
.search-head { text-align:center; margin-bottom:32px; }
.search-label { font-size:10px; letter-spacing:.35em; color:var(--terra); text-transform:uppercase; margin-bottom:10px; }
.search-title { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:300; color:var(--black); letter-spacing:.06em; margin-bottom:8px; }
.search-sub { font-size:12px; color:var(--text-sub); letter-spacing:.08em; line-height:1.9; }

.search-box { background:var(--white); border:1px solid var(--gray-1); padding:24px 20px; margin-bottom:16px; }
.search-box-title { font-size:11px; letter-spacing:.2em; color:var(--terra); text-transform:uppercase; margin-bottom:16px; }
.field-label { display:block; font-size:10px; letter-spacing:.22em; color:var(--text-sub); margin-bottom:8px; }
.field-input { width:100%; border:none; border-bottom:1px solid var(--gray-2); background:transparent; padding:10px 0; font-size:15px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-weight:300; outline:none; transition:border-color .2s; -webkit-appearance:none; border-radius:0; }
.field-input:focus { border-bottom-color:var(--terra); }
.field-input::placeholder { color:var(--gray-2); }

.or-divider { display:flex; align-items:center; gap:12px; margin:8px 0; }
.or-line { flex:1; height:1px; background:var(--gray-1); }
.or-text { font-size:11px; color:var(--text-sub); letter-spacing:.15em; }

.search-btn { width:100%; background:var(--black); color:var(--white); border:none; padding:18px; font-size:11px; letter-spacing:.3em; font-family:'Noto Sans JP',sans-serif; font-weight:300; cursor:pointer; transition:background .2s; margin-top:16px; }
.search-btn:active { background:var(--terra); }

/* ── RESULT ── */
.result-wrap { padding:20px; display:none; }
.result-card { background:var(--white); border:1px solid var(--gray-1); padding:20px; margin-bottom:16px; }
.result-badge { display:inline-block; font-size:10px; letter-spacing:.2em; color:var(--white); padding:3px 10px; margin-bottom:14px; }
.result-badge.trial { background:var(--terra); }
.result-badge.regular { background:var(--black); }
.result-badge.cancelled { background:var(--gray-3); }
.result-row { display:flex; justify-content:space-between; align-items:baseline; padding:10px 0; border-bottom:1px solid var(--gray-1); gap:12px; }
.result-row:last-child { border-bottom:none; }
.result-key { font-size:10px; letter-spacing:.18em; color:var(--text-sub); text-transform:uppercase; flex-shrink:0; }
.result-val { font-size:13px; color:var(--text); text-align:right; }
.result-num { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--terra); letter-spacing:.05em; }

.cancel-btn { width:100%; border:1.5px solid var(--terra); color:var(--terra); background:var(--white); padding:16px; font-size:11px; letter-spacing:.25em; font-family:'Noto Sans JP',sans-serif; font-weight:300; cursor:pointer; transition:all .2s; margin-top:12px; }
.cancel-btn:active { background:var(--terra); color:var(--white); }

.back-link { display:block; text-align:center; font-size:12px; color:var(--text-sub); letter-spacing:.1em; margin-top:20px; cursor:pointer; text-decoration:underline; }

/* ── CANCEL CONFIRM ── */
.confirm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; align-items:flex-end; }
.confirm-overlay.show { display:flex; }
.confirm-sheet { background:var(--white); padding:28px 20px 40px; width:100%; }
.confirm-title { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; color:var(--black); margin-bottom:10px; }
.confirm-text { font-size:13px; color:var(--text-sub); line-height:1.9; margin-bottom:24px; letter-spacing:.06em; }
.confirm-date { font-size:14px; color:var(--text); font-weight:400; }
.confirm-actions { display:flex; gap:10px; }
.confirm-yes { flex:1; background:var(--terra); color:var(--white); border:none; padding:16px; font-size:11px; letter-spacing:.25em; font-family:'Noto Sans JP',sans-serif; font-weight:300; cursor:pointer; }
.confirm-no { flex:1; background:var(--white); color:var(--text); border:1px solid var(--gray-2); padding:16px; font-size:11px; letter-spacing:.25em; font-family:'Noto Sans JP',sans-serif; font-weight:300; cursor:pointer; }

/* ── SUCCESS / ERROR ── */
.message-screen { display:none; min-height:calc(100vh - 56px); flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; }
.message-screen.show { display:flex; }
.message-icon { font-family:'Cormorant Garamond',serif; font-size:48px; margin-bottom:24px; }
.message-title { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:300; color:var(--black); letter-spacing:.08em; margin-bottom:12px; }
.message-text { font-size:13px; color:var(--text-sub); line-height:2.1; letter-spacing:.06em; margin-bottom:32px; }
.message-btn { border:1px solid var(--gray-2); background:var(--white); color:var(--text); padding:14px 32px; font-size:11px; letter-spacing:.25em; font-family:'Noto Sans JP',sans-serif; cursor:pointer; }

.note-box { margin:0 0 16px; padding:12px 14px; background:var(--white); border-left:2px solid var(--terra-soft); font-size:11px; color:var(--text-sub); letter-spacing:.07em; line-height:1.9; }

.not-found { text-align:center; padding:40px 20px; }
.not-found-icon { font-size:32px; margin-bottom:16px; }
.not-found-text { font-size:13px; color:var(--text-sub); line-height:2; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">iola fitness</div>
</header>

<div class="page-wrap">

  <!-- SEARCH -->
  <div class="search-wrap" id="searchScreen">
    <div class="search-head">
      <div class="search-label">Reservation</div>
      <div class="search-title">予約確認・キャンセル</div>
      <div class="search-sub">予約番号またはメールアドレスで<br>ご予約内容を確認できます。</div>
    </div>

    <div class="note-box">キャンセルは前日23:59まで受け付けています。<br>それ以降はiola.fitness098@gmail.comへご連絡ください。</div>

    <div class="search-box">
      <div class="search-box-title">予約番号で検索</div>
      <label class="field-label">予約番号</label>
      <input type="text" class="field-input" id="searchId" placeholder="例：IOLA-20260601-001" inputmode="text">
    </div>

    <div class="or-divider">
      <div class="or-line"></div>
      <div class="or-text">OR</div>
      <div class="or-line"></div>
    </div>

    <div class="search-box">
      <div class="search-box-title">メールアドレスで検索</div>
      <label class="field-label">メールアドレス</label>
      <input type="email" class="field-input" id="searchEmail" placeholder="example@email.com" inputmode="email">
    </div>

    <button class="search-btn" onclick="searchReservation()">予 約 を 確 認 す る</button>
  </div>

  <!-- RESULT -->
  <div class="result-wrap" id="resultScreen">
    <div id="resultList"></div>
    <span class="back-link" onclick="backToSearch()">← 検索に戻る</span>
  </div>

  <!-- SUCCESS -->
  <div class="message-screen" id="cancelSuccess">
    <div class="message-icon" style="color:var(--terra)">✓</div>
    <div class="message-title">キャンセルが完了しました</div>
    <div class="message-text">担当トレーナーより<br>確認のご連絡をいたします。</div>
    <button class="message-btn" onclick="backToSearch()">トップに戻る</button>
  </div>

  <!-- ERROR -->
  <div class="message-screen" id="errorScreen">
    <div class="message-icon" style="color:var(--gray-3)">!</div>
    <div class="message-title" id="errorTitle">予約が見つかりません</div>
    <div class="message-text" id="errorText">入力内容をご確認のうえ、<br>再度お試しください。</div>
    <button class="message-btn" onclick="backToSearch()">検索に戻る</button>
  </div>

</div>

<!-- CANCEL CONFIRM OVERLAY -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-sheet">
    <div class="confirm-title">キャンセルの確認</div>
    <div class="confirm-text">
      以下の予約をキャンセルします。<br>よろしいですか？
      <div class="confirm-date" id="confirmDetail" style="margin-top:10px;"></div>
    </div>
    <div class="confirm-actions">
      <button class="confirm-yes" onclick="executeCancell()">キャンセルする</button>
      <button class="confirm-no" onclick="closeConfirm()">戻る</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwc6LpNPIkZKOcg-0YeX3a986B31qJ28nbnF5Bd369aGS0TZXSnTsvPYc9tlDE3p4me/exec';

let currentCancelId = null;

function show(id) {
  ['searchScreen','resultScreen','cancelSuccess','errorScreen'].forEach(s => {
    const el = document.getElementById(s);
    if (el) el.style.display = s === id ? (s === 'resultScreen' ? 'block' : 'flex') : 'none';
  });
  if (id === 'searchScreen') document.getElementById('searchScreen').style.display = 'block';
  window.scrollTo(0,0);
}

async function searchReservation() {
  const bookingId = document.getElementById('searchId').value.trim();
  const email = document.getElementById('searchEmail').value.trim();

  if (!bookingId && !email) {
    alert('予約番号またはメールアドレスを入力してください。');
    return;
  }

  const btn = document.querySelector('.search-btn');
  btn.textContent = '検 索 中 …';
  btn.disabled = true;

  try {
    const params = new URLSearchParams({ action: 'search' });
    if (bookingId) params.append('bookingId', bookingId);
    if (email) params.append('email', email);

    const res = await fetch(`${GAS_URL}?${params.toString()}`);
    const data = await res.json();

    if (data.status === 'success' && data.reservations && data.reservations.length > 0) {
      renderResults(data.reservations);
      show('resultScreen');
    } else {
      document.getElementById('errorTitle').textContent = '予約が見つかりません';
      document.getElementById('errorText').textContent = '入力内容をご確認のうえ、\n再度お試しください。';
      show('errorScreen');
    }
  } catch(e) {
    document.getElementById('errorTitle').textContent = '通信エラー';
    document.getElementById('errorText').textContent = 'しばらく経ってから\n再度お試しください。';
    show('errorScreen');
  } finally {
    btn.textContent = '予 約 を 確 認 す る';
    btn.disabled = false;
  }
}

function renderResults(reservations) {
  const list = document.getElementById('resultList');
  list.innerHTML = '';

  reservations.forEach(r => {
    const isCancelled = r.status === 'キャンセル';
    const isTrial = r.type === 'trial';

    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <span class="result-badge ${isCancelled ? 'cancelled' : isTrial ? 'trial' : 'regular'}">
        ${isCancelled ? 'キャンセル済み' : isTrial ? 'Trial' : 'Session'}
      </span>
      <div class="result-row">
        <span class="result-key">予約番号</span>
        <span class="result-val result-num">${r.bookingId || '—'}</span>
      </div>
      <div class="result-row">
        <span class="result-key">Menu</span>
        <span class="result-val">${r.menu || '体験セッション'}</span>
      </div>
      <div class="result-row">
        <span class="result-key">Date</span>
        <span class="result-val">${r.date || '—'}</span>
      </div>
      <div class="result-row">
        <span class="result-key">Time</span>
        <span class="result-val">${r.time || '—'}</span>
      </div>
      <div class="result-row">
        <span class="result-key">Name</span>
        <span class="result-val">${r.name || '—'}</span>
      </div>
     ${!isCancelled ? '<button class="cancel-btn" onclick="confirmCancel(\'' + r.bookingId + '\', \'' + (r.menu || '体験セッション') + '\', \'' + r.date + '\', \'' + r.time + '\')">この予約をキャンセルする</button>' : ''}
    list.appendChild(card);
  });
}

function confirmCancel(id, menu, date, time) {
  currentCancelId = id;
  document.getElementById('confirmDetail').textContent = `${menu}　${date}　${time}`;
  document.getElementById('confirmOverlay').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('show');
  currentCancelId = null;
}

async function executeCancell() {
  if (!currentCancelId) return;
  closeConfirm();

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'cancel', bookingId: currentCancelId }),
    });
    const data = await res.json();

    if (data.status === 'success') {
      show('cancelSuccess');
    } else {
      alert('エラー：' + (data.message || '不明'));
    }
  } catch(e) {
    alert('エラーが発生しました。iola.fitness098@gmail.comへご連絡ください。');
  }
}

function backToSearch() {
  document.getElementById('searchId').value = '';
  document.getElementById('searchEmail').value = '';
  show('searchScreen');
}

// 初期表示
show('searchScreen');
</script>
</body>
</html>
